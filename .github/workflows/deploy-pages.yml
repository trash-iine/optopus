name: Deploy docs to GitHub Pages

# One-time setup: in repo Settings → Pages, set Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of this workflow.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        # The committed *.slim.toml + index.json are the viewer's data source
        # (regenerated locally by docs/benchmarks/render.py). Raw result TOMLs
        # are gitignored, so nothing heavy needs pruning here.
        run: |
          cp -r docs _site
          find _site/benchmarks/data -name '*.toml' ! -name '*.slim.toml' -delete
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
