name: Deploy docs to GitHub Pages

# One-time setup: in repo Settings → Pages, set Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of this workflow.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install tomli-w
      - name: Regenerate viewer data (slim TOML + manifest) and markdown
        run: python3 docs/benchmarks/render.py
      - name: Stage site (drop the heavy raw benchmark TOMLs)
        run: |
          cp -r docs _site
          find _site/benchmarks/data -name '*.toml' ! -name '*.slim.toml' -delete
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
