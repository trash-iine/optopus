# MaxSAT × SimulatedAnnealing.

num_runs = 1

[[instances]]
path = "data/instances/sat/sample.cnf"
problem = "Sat"

[[heuristics]]
kind = "SimulatedAnnealing"
neighbor = "Flip"
# Starting temperature (small here because Δ between flips is integer & small).
initial_temperature = 5.0
# Cooling factor α.
cooling_rate = 0.999

[heuristics.stop_condition]
max_iteration = 200_000
max_duration_secs = 5.0
# max_failed_update = 50_000
