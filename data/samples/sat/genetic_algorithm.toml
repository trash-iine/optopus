# MaxSAT × GeneticAlgorithm.

num_runs = 1

[[instances]]
path = "data/sat/sample.cnf"
problem = "Sat"

[[heuristics]]
kind = "GeneticAlgorithm"
# Population size (must be ≥ 2).
population_size = 10
# SAT accepts only "Uniform".
crossover_kind = "Uniform"
# "Tournament" (default) | "DistantTopK".
parent_selection = "Tournament"
# parent_top_k = 5  # required when parent_selection = "DistantTopK"

[heuristics.stop_condition]
max_iteration = 1_000_000
max_duration_secs = 10.0
# max_failed_update = 200_000

[[heuristics.steps]]
kind = "TabuSearch"
neighbor = "Flip"
tabu_tenure = [3, 10]

[heuristics.steps.stop_condition]
max_failed_update = 200
# max_iteration     = 1_000
# max_duration_secs = 1.0

# --- Optional steps[1]: init_improvement (HEA pattern). Uncomment to enable.
# [[heuristics.steps]]
# kind = "LocalSearch"
# neighbor = "Flip"
# [heuristics.steps.stop_condition]
# max_failed_update = 1
