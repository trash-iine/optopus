# MaxSAT × RLSearch.

num_runs = 1

[[instances]]
path = "data/instances/sat/sample.cnf"
problem = "Sat"

[[heuristics]]
kind = "RLSearch"
neighbor = "Flip"
# Step size for the policy weight update (0.0 ⇒ frozen weights / eval mode).
learning_rate = 0.01
# Discount factor γ.
discount = 0.99
# Softmax temperature on candidate logits.
softmax_temperature = 1.0
# Reward shaping: "Raw" | "Normalized" | "BestImprovement".
reward_shaping = "Normalized"
# max_candidates = 1024
# policy_weights = [0.0, 0.0, 0.0, 0.0]

[heuristics.stop_condition]
max_iteration = 100_000
max_duration_secs = 5.0
# max_failed_update = 20_000
