# QUBO × TabuSearch.

num_runs = 1

[[instances]]
path = "data/instances/qubo/sample.txt"
problem = "Qubo"

[[heuristics]]
kind = "TabuSearch"
# Flip (single-bit) | Swap (exchange two bits).
neighbor = "Flip"
# Tabu tenure sampled uniformly from [min, max].
tabu_tenure = [3, 10]

[heuristics.stop_condition]
max_iteration = 100_000
max_duration_secs = 5.0
# max_failed_update = 10_000
