# QUBO × SimulatedAnnealing.

num_runs = 1

[[instances]]
path = "data/qubo/sample.txt"
problem = "Qubo"

[[heuristics]]
kind = "SimulatedAnnealing"
neighbor = "Flip"
# Starting temperature T₀.
initial_temperature = 100.0
# Cooling factor α: T ← α · T  (closer to 1 = slower cooling).
cooling_rate = 0.9995

[heuristics.stop_condition]
max_iteration = 200_000
max_duration_secs = 5.0
# max_failed_update = 50_000
