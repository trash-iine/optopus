# QUBO × LocalSearch — minimization. Loads a sparse Q-matrix file via
# `Qubo::load_file` (header `N M`, then `i j v` 1-indexed).

num_runs = 1

[[instances]]
path = "data/qubo/sample.txt"
problem = "Qubo"

[[heuristics]]
kind = "LocalSearch"
# Flip (single-bit) | Swap (exchange two bits).
neighbor = "Flip"

[heuristics.stop_condition]
# Halt at the first local optimum.
max_failed_update = 1
# max_iteration     = 1_000_000
# max_duration_secs = 5.0
