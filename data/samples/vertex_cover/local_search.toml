# VertexCover × LocalSearch — minimization. Loads a graph in MaxCut text format.

num_runs = 1

[[instances]]
path = "data/max_cut/sample.txt"
problem = "VertexCover"

[[heuristics]]
kind = "LocalSearch"
# Flip (toggle one vertex) | Swap (exchange membership of two vertices).
neighbor = "Flip"

[heuristics.stop_condition]
max_failed_update = 1
# max_iteration     = 1_000_000
# max_duration_secs = 5.0
