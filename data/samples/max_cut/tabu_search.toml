# MaxCut × TabuSearch — best non-tabu neighbor with aspiration override.

num_runs = 1

[[instances]]
path = "data/instances/max_cut/sample.txt"
problem = "MaxCut"

[[heuristics]]
kind = "TabuSearch"
# Flip (single-bit) | Swap (exchange two bits).
neighbor = "Flip"
# Tabu tenure sampled uniformly from [min, max] each time a move is added.
tabu_tenure = [3, 10]

[heuristics.stop_condition]
# Hard cap on iterations (one neighborhood evaluation per iteration).
max_iteration = 100_000
# Wall-clock budget in seconds.
max_duration_secs = 5.0
# Stop when no global-best update happens for this many consecutive iterations.
# max_failed_update = 10_000
