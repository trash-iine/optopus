# MaxCut × BreakoutLocalSearch — local search + adaptive perturbation
# (strong/weak flip/swap), probabilities decayed by the non-improvement counter.

num_runs = 1

[[instances]]
path = "data/instances/max_cut/sample.txt"
problem = "MaxCut"

[[heuristics]]
kind = "BreakoutLocalSearch"
# Tabu tenure for the inner descent (sampled uniformly from [min, max]).
tabu_tenure = [3, 80]
# Perturbation strength threshold T (after T non-improving steps, escalate).
t = 1000
# Initial perturbation length L₀ (number of perturbation moves applied).
l0 = 8
# Initial probability p₀ of choosing the *strong* perturbation operator.
p0 = 0.8
# Decay factor q applied to p₀ (lower ⇒ probabilities drop faster).
q = 0.5

[heuristics.stop_condition]
max_iteration = 1_000_000
max_duration_secs = 5.0
# max_failed_update = 200_000
