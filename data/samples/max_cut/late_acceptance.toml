# MaxCut × LateAcceptanceHillClimbing —
# accept any move whose score is no worse than the score `history_length` steps ago.

num_runs = 1

[[instances]]
path = "data/max_cut/sample.txt"
problem = "MaxCut"

[[heuristics]]
kind = "LateAcceptanceHillClimbing"
neighbor = "Flip"
# Length of the score history buffer. Larger ⇒ more diversification (slower convergence).
history_length = 100

[heuristics.stop_condition]
max_iteration = 200_000
max_duration_secs = 5.0
# max_failed_update = 50_000
