# MaxCut × GeneticAlgorithm — 2-parent selection → crossover → mutation
# (steps[0]) → worst-replacement (built-in elitism preserves the best).

num_runs = 1

[[instances]]
path = "data/max_cut/sample.txt"
problem = "MaxCut"

[[heuristics]]
kind = "GeneticAlgorithm"
# Population size (must be ≥ 2).
population_size = 10
# Crossover operator. MaxCut accepts only "Uniform" (per-bit random parent).
crossover_kind = "Uniform"
# Parent selection strategy: "Tournament" (random pair, keep the better) | "DistantTopK".
parent_selection = "Tournament"
# Required when parent_selection = "DistantTopK": picks B from the top-K most
# distant individuals from A (encourages diverse parent pairs).
# parent_top_k = 5

[heuristics.stop_condition]
max_iteration = 1_000_000
max_duration_secs = 10.0
# max_failed_update = 200_000

# --- steps[0]: mutation operator applied to every offspring -----------------
[[heuristics.steps]]
kind = "TabuSearch"
neighbor = "Flip"
tabu_tenure = [3, 10]

[heuristics.steps.stop_condition]
max_failed_update = 200
# max_iteration     = 1_000
# max_duration_secs = 1.0

# --- Optional steps[1]: init_improvement applied to each random initial
# individual (HEA pattern). Uncomment to enable.
