# TSP × TabuSearch (2-opt).

num_runs = 1

[[instances]]
path = "data/tsp/sample.tsp"
problem = "Tsp"

[[heuristics]]
kind = "TabuSearch"
# TwoOpt | Relocate.
neighbor = "TwoOpt"
# Tabu tenure sampled uniformly from [min, max].
tabu_tenure = [3, 10]

[heuristics.stop_condition]
max_iteration = 50_000
max_duration_secs = 5.0
# max_failed_update = 10_000
