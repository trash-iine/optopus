# TSP × Sequential — 2-opt local search then relocate tabu search.

num_runs = 1

[[instances]]
path = "data/tsp/sample.tsp"
problem = "Tsp"

[[heuristics]]
kind = "Sequential"

[heuristics.stop_condition]
max_iteration = 1_000_000
max_duration_secs = 10.0
# max_failed_update = 100_000

[[heuristics.steps]]
kind = "LocalSearch"
neighbor = "TwoOpt"

[heuristics.steps.stop_condition]
max_failed_update = 1
# max_iteration     = 1_000_000
# max_duration_secs = 5.0

[[heuristics.steps]]
kind = "TabuSearch"
neighbor = "Relocate"
tabu_tenure = [3, 10]

[heuristics.steps.stop_condition]
max_iteration = 10_000
# max_duration_secs = 5.0
# max_failed_update = 1_000
