# TSP × LocalSearch — minimization. Uses 2-opt by default.

num_runs = 1

[[instances]]
# TSPLIB-format file (NAME / TYPE / DIMENSION / EDGE_WEIGHT_TYPE / NODE_COORD_SECTION).
path = "data/instances/tsp/sample.tsp"
problem = "Tsp"

[[heuristics]]
kind = "LocalSearch"
# TwoOpt (reverse a tour segment) | Relocate (move one city elsewhere).
neighbor = "TwoOpt"

[heuristics.stop_condition]
max_failed_update = 1
# max_iteration     = 1_000_000
# max_duration_secs = 5.0
