# TSP × LinKernighanHelsgott — variable-depth k-opt with neighbor lists.

num_runs = 1

[[instances]]
path = "data/tsp/sample.tsp"
problem = "Tsp"

[[heuristics]]
kind = "LinKernighanHelsgott"
# Number of nearest-neighbor candidates considered for sequential edge replacement.
num_neighbors = 5
# Maximum recursion depth of the variable-depth chain (max k in k-opt).
max_depth = 5

[heuristics.stop_condition]
max_iteration = 1_000
max_duration_secs = 5.0
# max_failed_update = 100
