# TSP × Iterated (ILS) — 2-opt search + relocate-based perturbation.

num_runs = 1

[[instances]]
path = "data/instances/tsp/sample.tsp"
problem = "Tsp"

[[heuristics]]
kind = "Iterated"

[heuristics.stop_condition]
max_iteration = 1_000_000
max_duration_secs = 10.0
# max_failed_update = 100_000

# --- search phase -----------------------------------------------------------
[[heuristics.steps]]
kind = "LocalSearch"
neighbor = "TwoOpt"

[heuristics.steps.stop_condition]
max_failed_update = 1
# max_iteration     = 1_000_000
# max_duration_secs = 5.0

# --- perturbation phase (relocate moves to escape the 2-opt basin) ----------
[[heuristics.steps]]
kind = "SimulatedAnnealing"
neighbor = "Relocate"
initial_temperature = 5.0
cooling_rate = 0.99

[heuristics.steps.stop_condition]
max_iteration = 50
# max_duration_secs = 1.0
# max_failed_update = 25
