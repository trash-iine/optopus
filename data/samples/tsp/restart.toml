# TSP × Restart.

num_runs = 1

[[instances]]
path = "data/instances/tsp/sample.tsp"
problem = "Tsp"

[[heuristics]]
kind = "Restart"

[heuristics.stop_condition]
max_iteration = 1_000_000
max_duration_secs = 10.0
# max_failed_update = 200_000

[heuristics.restart_condition]
max_failed_update = 2_000
# max_iteration     = 20_000
# max_duration_secs = 2.0

[[heuristics.steps]]
kind = "TabuSearch"
neighbor = "TwoOpt"
tabu_tenure = [3, 10]

[heuristics.steps.stop_condition]
max_iteration = 10_000
# max_duration_secs = 5.0
# max_failed_update = 2_000
