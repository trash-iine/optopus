<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Optopus benchmark viewer</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #1a1a1a;
  --muted: #6b6b6b;
  --border: #d4d4d4;
  --chip-bg: #f3f3f3;
  --chip-on: #1a73e8;
  --chip-on-fg: #ffffff;
  --best-bg: #c8e6c9;
  --best-fg: #1b5e20;
  --header-bg: #f8f8f8;
  --row-alt: #fafafa;
  --section-bg: #eef2ff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  color: var(--fg);
  background: var(--bg);
}
header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
header h1 {
  font-size: 15px;
  font-weight: 600;
  margin: 0;
}
.view-toggle button {
  border: 1px solid var(--border);
  background: var(--chip-bg);
  padding: 4px 12px;
  cursor: pointer;
  font: inherit;
}
.view-toggle button.on {
  background: var(--chip-on);
  color: var(--chip-on-fg);
  border-color: var(--chip-on);
}
.view-toggle button:first-child { border-radius: 4px 0 0 4px; }
.view-toggle button:last-child { border-radius: 0 4px 4px 0; }
.filters {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 6px;
  column-gap: 8px;
  align-items: center;
  background: var(--header-bg);
}
.filters label.row-label {
  font-weight: 600;
  color: var(--muted);
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.chip {
  border: 1px solid var(--border);
  background: var(--chip-bg);
  padding: 2px 8px;
  border-radius: 12px;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
}
.chip.on {
  background: var(--chip-on);
  color: var(--chip-on-fg);
  border-color: var(--chip-on);
}
.filters input[type=text] {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font: inherit;
  width: 240px;
}
.filters select {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font: inherit;
}
.filters .reset {
  margin-left: 8px;
  border: 1px solid var(--border);
  background: var(--chip-bg);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font: inherit;
}
main {
  padding: 8px 16px 240px 16px;
}
.summary-bar {
  padding: 6px 0;
  color: var(--muted);
  font-size: 12px;
}
.table-wrap {
  overflow: auto;
  border: 1px solid var(--border);
  max-height: calc(100vh - 280px);
}
table {
  border-collapse: collapse;
  font-size: 12px;
  width: max-content;
  min-width: 100%;
}
th, td {
  border: 1px solid var(--border);
  padding: 4px 8px;
  text-align: right;
  white-space: nowrap;
}
th {
  background: var(--header-bg);
  font-weight: 600;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 2;
}
th.section, td.section {
  background: var(--section-bg);
  text-align: left;
  font-weight: 600;
  position: sticky;
  left: 0;
  z-index: 3;
}
td.instance {
  text-align: left;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  position: sticky;
  left: 0;
  background: var(--bg);
  z-index: 1;
}
tr:nth-child(even) td.instance { background: var(--row-alt); }
tr:nth-child(even) td:not(.instance) { background: var(--row-alt); }
td.best {
  background: var(--best-bg) !important;
  color: var(--best-fg);
  font-weight: 700;
}
td.empty { color: var(--muted); font-style: italic; text-align: center; }
td.clickable { cursor: pointer; }
td.clickable:hover { outline: 2px solid var(--chip-on); outline-offset: -2px; }
th.sortable { cursor: pointer; }
th.sortable.sort-asc::after { content: " \25B2"; }
th.sortable.sort-desc::after { content: " \25BC"; }
.detail {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  max-height: 220px;
  overflow: auto;
  font-size: 12px;
  z-index: 9;
}
.detail.hidden { display: none; }
.detail h2 {
  margin: 0 0 6px 0;
  font-size: 13px;
}
.detail dl {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 2px 16px;
  margin: 0;
}
.detail dt { color: var(--muted); }
.detail dd { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.detail .close {
  float: right;
  cursor: pointer;
  border: none;
  background: none;
  font-size: 16px;
  color: var(--muted);
}
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 11px;
  background: var(--chip-bg);
  color: var(--muted);
  margin-left: 4px;
}
.badge.small { background: #e3f2fd; color: #1565c0; }
.badge.medium { background: #fff3e0; color: #ef6c00; }
.badge.large { background: #fce4ec; color: #ad1457; }
.empty-state {
  padding: 40px;
  text-align: center;
  color: var(--muted);
}
</style>
</head>
<body>
<header>
  <h1>Optopus benchmark viewer</h1>
  <div class="view-toggle">
    <button id="view-comparison" class="on">Comparison</button>
    <button id="view-flat">Flat</button>
  </div>
</header>

<section class="filters" id="filter-bar">
  <label class="row-label">Problem</label><div class="chips" data-axis="problems"></div>
  <label class="row-label">Heuristic</label><div class="chips" data-axis="kinds"></div>
  <label class="row-label">Neighbor</label><div class="chips" data-axis="neighbors"></div>
  <label class="row-label">Band</label><div class="chips" data-axis="bands"></div>
  <label class="row-label">Instance</label>
  <div>
    <input type="text" id="instance-filter" placeholder="substring (case-insensitive)">
    <button class="reset" id="reset-filters">Reset filters</button>
  </div>
  <label class="row-label">Metric</label>
  <div>
    <select id="metric">
      <option value="best_objective">best objective</option>
      <option value="avg_objective">avg objective</option>
      <option value="worst_objective">worst objective</option>
      <option value="std_objective">std objective (lower better)</option>
      <option value="best_time_to_best_secs">best time-to-best [s] (lower better)</option>
      <option value="avg_time_to_best_secs">avg time-to-best [s] (lower better)</option>
      <option value="avg_total_time_secs">avg total time [s] (lower better)</option>
    </select>
  </div>
</section>

<main>
  <div class="summary-bar" id="summary"></div>
  <div class="table-wrap" id="table-wrap"></div>
</main>

<aside class="detail hidden" id="detail">
  <button class="close" id="detail-close">&times;</button>
  <h2 id="detail-title"></h2>
  <dl id="detail-body"></dl>
</aside>

<script type="module">
"use strict";

import { parse as parseToml } from "./vendor/smol-toml.js";

// Objective direction per problem (mirrors PROBLEM_DIRECTION in render.py).
const PROBLEM_DIRECTION = {
  MaxCut: "max",
  SAT: "max",
  QUBO: "min",
  TSP: "min",
  JobShopScheduling: "min",
  VertexCover: "min",
};

// Populated by loadData() before the UI is bootstrapped.
let DATA = null;

function instanceStem(instancePath) {
  const base = instancePath.split(/[\\/]/).pop();
  const dot = base.lastIndexOf(".");
  return dot > 0 ? base.slice(0, dot) : base;
}

function sourceFromPath(relPath) {
  return relPath.split("/").pop().replace(/\.slim\.toml$/, "");
}

function deriveBand(source) {
  for (const band of ["small", "medium", "large"]) {
    if (source.endsWith(`_${band}`)) return band;
  }
  return null;
}

// Mirror of fmt_hyperparams() in render.py: same field order and formatting.
function fmtHyperparams(heuristic) {
  const parts = [];
  for (const key of ["tabu_tenure", "t", "l0", "p0", "q"]) {
    let v = heuristic[key];
    if (v === undefined || v === null) continue;
    if (Array.isArray(v)) v = "(" + v.join(", ") + ")";
    parts.push(`${key}=${v}`);
  }
  const sc = heuristic.stop_condition || {};
  for (const key of ["max_iteration", "max_duration_secs", "max_failed_update"]) {
    if (sc[key] !== undefined && sc[key] !== null) parts.push(`${key}=${sc[key]}`);
  }
  return parts.join(", ");
}

// Fetch manifest.json, then each slim TOML in parallel; parse client-side and
// flatten into the { problem_direction, rows } shape the UI expects.
async function loadData() {
  const manifestResp = await fetch("data/manifest.json");
  if (!manifestResp.ok) throw new Error(`manifest.json (HTTP ${manifestResp.status})`);
  const manifest = await manifestResp.json();
  const perFile = await Promise.all(manifest.map(async (entry) => {
    const resp = await fetch(`data/${entry.path}`);
    if (!resp.ok) throw new Error(`${entry.path} (HTTP ${resp.status})`);
    const doc = parseToml(await resp.text());
    const source = sourceFromPath(entry.path);
    const band = deriveBand(source);
    return (doc.results || []).map((r) => ({
      problem: entry.problem,
      instance: instanceStem(r.instance_path),
      instance_path: r.instance_path,
      heuristic_kind: r.heuristic.kind,
      neighbor: r.heuristic.neighbor ?? null,
      source,
      band,
      summary: r.summary,
      hyperparams: fmtHyperparams(r.heuristic),
    }));
  }));
  return { problem_direction: PROBLEM_DIRECTION, rows: perFile.flat() };
}

// Metrics where lower is better regardless of problem direction.
const LOWER_BETTER_METRICS = new Set([
  "std_objective",
  "best_time_to_best_secs",
  "avg_time_to_best_secs",
  "avg_total_time_secs",
]);

const SUMMARY_FIELDS = [
  ["best_objective", "best"],
  ["avg_objective", "avg"],
  ["worst_objective", "worst"],
  ["std_objective", "std"],
  ["best_time_to_best_secs", "best t-to-best [s]"],
  ["avg_time_to_best_secs", "avg t-to-best [s]"],
  ["avg_total_time_secs", "avg total [s]"],
  ["num_successful_runs", "runs"],
];

const STATE = {
  view: "comparison",
  problems: new Set(),
  kinds: new Set(),
  neighbors: new Set(),
  bands: new Set(),
  instance: "",
  metric: "best_objective",
  flatSortKey: "instance",
  flatSortDir: "asc",
};

function bootstrapState() {
  if (!DATA || !DATA.rows) return;
  // Initialize all chips to active.
  for (const row of DATA.rows) {
    STATE.problems.add(row.problem);
    STATE.kinds.add(row.heuristic_kind);
    if (row.neighbor) STATE.neighbors.add(row.neighbor);
    if (row.band) STATE.bands.add(row.band);
  }
}

function allValues(axis) {
  const set = new Set();
  for (const row of DATA.rows) {
    if (axis === "problems") set.add(row.problem);
    else if (axis === "kinds") set.add(row.heuristic_kind);
    else if (axis === "neighbors") { if (row.neighbor) set.add(row.neighbor); }
    else if (axis === "bands") { if (row.band) set.add(row.band); }
  }
  return Array.from(set).sort();
}

function renderChips() {
  for (const axis of ["problems", "kinds", "neighbors", "bands"]) {
    const el = document.querySelector(`.chips[data-axis="${axis}"]`);
    el.innerHTML = "";
    for (const v of allValues(axis)) {
      const chip = document.createElement("span");
      chip.className = "chip" + (STATE[axis].has(v) ? " on" : "");
      chip.textContent = v;
      chip.addEventListener("click", () => {
        if (STATE[axis].has(v)) STATE[axis].delete(v);
        else STATE[axis].add(v);
        chip.classList.toggle("on");
        updateHash();
        render();
      });
      el.appendChild(chip);
    }
  }
}

function filteredRows() {
  const needle = STATE.instance.trim().toLowerCase();
  return DATA.rows.filter(r => {
    if (!STATE.problems.has(r.problem)) return false;
    if (!STATE.kinds.has(r.heuristic_kind)) return false;
    if (r.neighbor && !STATE.neighbors.has(r.neighbor)) return false;
    if (r.band && !STATE.bands.has(r.band)) return false;
    if (needle && !r.instance.toLowerCase().includes(needle)) return false;
    return true;
  });
}

function colKey(row) {
  return row.neighbor ? `${row.heuristic_kind} (${row.neighbor})` : row.heuristic_kind;
}

function metricValue(row) {
  const v = row.summary[STATE.metric];
  return (v === undefined || v === null) ? null : v;
}

function rowBetterDirection(problem) {
  // For objective-type metrics use problem direction; otherwise min.
  if (LOWER_BETTER_METRICS.has(STATE.metric)) return "min";
  return DATA.problem_direction[problem] || "max";
}

function fmtNum(x) {
  if (x === null || x === undefined) return "-";
  if (typeof x !== "number") return String(x);
  if (Number.isInteger(x)) return String(x);
  if (Math.abs(x) >= 1000) return x.toFixed(2);
  if (Math.abs(x) >= 1) return x.toFixed(3);
  return x.toPrecision(3);
}

function renderComparison() {
  const rows = filteredRows();
  const wrap = document.getElementById("table-wrap");
  if (rows.length === 0) {
    wrap.innerHTML = `<div class="empty-state">No rows match current filters.</div>`;
    return;
  }

  // Collect column keys (sorted by kind then neighbor).
  const colSet = new Set();
  for (const r of rows) colSet.add(colKey(r));
  const cols = Array.from(colSet).sort();

  // Group rows by (problem, instance).
  const byPI = new Map();
  for (const r of rows) {
    const k = `${r.problem}\t${r.instance}`;
    if (!byPI.has(k)) byPI.set(k, { problem: r.problem, instance: r.instance, cells: new Map() });
    byPI.get(k).cells.set(colKey(r), r);
  }

  // Sort: by problem, then instance natural-ish order.
  const groups = Array.from(byPI.values()).sort((a, b) => {
    if (a.problem !== b.problem) return a.problem.localeCompare(b.problem);
    return instanceCompare(a.instance, b.instance);
  });

  // Build HTML.
  const t = document.createElement("table");
  const thead = document.createElement("thead");
  const trh = document.createElement("tr");
  trh.appendChild(makeTh("Problem"));
  trh.appendChild(makeTh("Instance"));
  for (const c of cols) trh.appendChild(makeTh(c));
  thead.appendChild(trh);
  t.appendChild(thead);

  const tbody = document.createElement("tbody");
  let lastProblem = null;
  for (const g of groups) {
    const tr = document.createElement("tr");
    // Problem cell (only show once per group; merged visually via class)
    const tdP = document.createElement("td");
    tdP.className = "section";
    tdP.textContent = (g.problem !== lastProblem) ? g.problem : "";
    tr.appendChild(tdP);
    lastProblem = g.problem;

    const tdI = document.createElement("td");
    tdI.className = "instance";
    tdI.textContent = g.instance;
    tr.appendChild(tdI);

    // Determine best value among present cells.
    const direction = rowBetterDirection(g.problem);
    let best = null;
    for (const c of cols) {
      const r = g.cells.get(c);
      if (!r) continue;
      const v = metricValue(r);
      if (v === null) continue;
      if (best === null || (direction === "max" ? v > best : v < best)) best = v;
    }

    for (const c of cols) {
      const td = document.createElement("td");
      const r = g.cells.get(c);
      if (!r) {
        td.className = "empty";
        td.textContent = "-";
      } else {
        const v = metricValue(r);
        td.className = "clickable";
        if (v !== null && v === best) td.classList.add("best");
        td.textContent = fmtNum(v);
        td.addEventListener("click", () => showDetail(r));
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  t.appendChild(tbody);

  wrap.innerHTML = "";
  wrap.appendChild(t);
}

function instanceCompare(a, b) {
  // Numeric-aware: split into chunks of (digit, non-digit).
  const ra = a.match(/(\d+|\D+)/g) || [a];
  const rb = b.match(/(\d+|\D+)/g) || [b];
  for (let i = 0; i < Math.min(ra.length, rb.length); i++) {
    const xa = ra[i], xb = rb[i];
    const na = parseInt(xa, 10), nb = parseInt(xb, 10);
    if (!isNaN(na) && !isNaN(nb)) {
      if (na !== nb) return na - nb;
    } else if (xa !== xb) {
      return xa < xb ? -1 : 1;
    }
  }
  return ra.length - rb.length;
}

function makeTh(text, sortKey) {
  const th = document.createElement("th");
  th.textContent = text;
  if (sortKey) {
    th.classList.add("sortable");
    if (STATE.flatSortKey === sortKey) {
      th.classList.add(STATE.flatSortDir === "asc" ? "sort-asc" : "sort-desc");
    }
    th.addEventListener("click", () => {
      if (STATE.flatSortKey === sortKey) {
        STATE.flatSortDir = STATE.flatSortDir === "asc" ? "desc" : "asc";
      } else {
        STATE.flatSortKey = sortKey;
        STATE.flatSortDir = "asc";
      }
      render();
    });
  }
  return th;
}

const FLAT_COLS = [
  ["problem", "Problem"],
  ["instance", "Instance"],
  ["heuristic_kind", "Heuristic"],
  ["neighbor", "Neighbor"],
  ["band", "Band"],
  ["best_objective", "Best"],
  ["avg_objective", "Avg"],
  ["worst_objective", "Worst"],
  ["std_objective", "Std"],
  ["best_time_to_best_secs", "Best t-to-best"],
  ["avg_time_to_best_secs", "Avg t-to-best"],
  ["avg_total_time_secs", "Avg total"],
  ["num_successful_runs", "Runs"],
  ["source", "Source"],
  ["hyperparams", "Hyperparams"],
];

function flatField(row, key) {
  if (["problem", "instance", "heuristic_kind", "neighbor", "band", "source", "hyperparams"].includes(key)) {
    return row[key];
  }
  return row.summary[key];
}

function renderFlat() {
  const rows = filteredRows();
  const wrap = document.getElementById("table-wrap");
  if (rows.length === 0) {
    wrap.innerHTML = `<div class="empty-state">No rows match current filters.</div>`;
    return;
  }

  const sortKey = STATE.flatSortKey;
  const dir = STATE.flatSortDir === "asc" ? 1 : -1;
  const sorted = rows.slice().sort((a, b) => {
    const va = flatField(a, sortKey);
    const vb = flatField(b, sortKey);
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (typeof va === "number" && typeof vb === "number") return (va - vb) * dir;
    if (sortKey === "instance") return instanceCompare(va, vb) * dir;
    return String(va).localeCompare(String(vb)) * dir;
  });

  const t = document.createElement("table");
  const thead = document.createElement("thead");
  const trh = document.createElement("tr");
  for (const [k, label] of FLAT_COLS) trh.appendChild(makeTh(label, k));
  thead.appendChild(trh);
  t.appendChild(thead);

  const tbody = document.createElement("tbody");
  for (const r of sorted) {
    const tr = document.createElement("tr");
    for (const [k] of FLAT_COLS) {
      const td = document.createElement("td");
      const v = flatField(r, k);
      if (k === "band" && v) {
        const span = document.createElement("span");
        span.className = `badge ${v}`;
        span.textContent = v;
        td.appendChild(span);
        td.style.textAlign = "left";
      } else if (k === "problem" || k === "instance" || k === "heuristic_kind" || k === "neighbor" || k === "source" || k === "hyperparams") {
        td.textContent = v ?? "-";
        td.style.textAlign = "left";
      } else {
        td.textContent = fmtNum(v);
      }
      td.classList.add("clickable");
      td.addEventListener("click", () => showDetail(r));
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  t.appendChild(tbody);

  wrap.innerHTML = "";
  wrap.appendChild(t);
}

function showDetail(r) {
  const detail = document.getElementById("detail");
  detail.classList.remove("hidden");
  document.getElementById("detail-title").textContent =
    `${r.problem} / ${r.instance} — ${colKey(r)}`;
  const dl = document.getElementById("detail-body");
  dl.innerHTML = "";
  const fields = [
    ["instance_path", r.instance_path],
    ["band", r.band ?? "-"],
    ["source", r.source],
    ["hyperparams", r.hyperparams || "-"],
    ...SUMMARY_FIELDS.map(([k, label]) => [label, fmtNum(r.summary[k])]),
  ];
  for (const [k, v] of fields) {
    const dt = document.createElement("dt"); dt.textContent = k;
    const dd = document.createElement("dd"); dd.textContent = v;
    dl.appendChild(dt); dl.appendChild(dd);
  }
}

function render() {
  if (!DATA || !DATA.rows) {
    document.getElementById("table-wrap").innerHTML =
      `<div class="empty-state">No benchmark data loaded.</div>`;
    document.getElementById("summary").textContent = "";
    return;
  }
  const filtered = filteredRows();
  const problems = new Set(filtered.map(r => r.problem));
  const instances = new Set(filtered.map(r => `${r.problem}/${r.instance}`));
  document.getElementById("summary").textContent =
    `${filtered.length} rows across ${problems.size} problem(s), ${instances.size} (problem, instance) pair(s).`;
  if (STATE.view === "comparison") renderComparison();
  else renderFlat();
}

function updateHash() {
  const parts = [];
  parts.push(`view=${STATE.view}`);
  const dumpSet = (key, axis) => {
    const all = allValues(axis);
    const cur = Array.from(STATE[axis]);
    if (cur.length !== all.length) parts.push(`${key}=${cur.sort().join(",")}`);
  };
  dumpSet("problem", "problems");
  dumpSet("kind", "kinds");
  dumpSet("neighbor", "neighbors");
  dumpSet("band", "bands");
  if (STATE.instance) parts.push(`instance=${encodeURIComponent(STATE.instance)}`);
  if (STATE.metric !== "best_objective") parts.push(`metric=${STATE.metric}`);
  if (STATE.view === "flat") {
    if (STATE.flatSortKey !== "instance") parts.push(`sort=${STATE.flatSortKey}`);
    if (STATE.flatSortDir !== "asc") parts.push(`dir=${STATE.flatSortDir}`);
  }
  const next = "#" + parts.join("&");
  if (location.hash !== next) history.replaceState(null, "", next);
}

function loadHash() {
  if (!location.hash) return;
  const params = new URLSearchParams(location.hash.slice(1));
  const setAxis = (key, axis) => {
    if (params.has(key)) {
      STATE[axis] = new Set(params.get(key).split(",").filter(Boolean));
    }
  };
  if (params.has("view")) STATE.view = params.get("view");
  setAxis("problem", "problems");
  setAxis("kind", "kinds");
  setAxis("neighbor", "neighbors");
  setAxis("band", "bands");
  if (params.has("instance")) STATE.instance = params.get("instance");
  if (params.has("metric")) STATE.metric = params.get("metric");
  if (params.has("sort")) STATE.flatSortKey = params.get("sort");
  if (params.has("dir")) STATE.flatSortDir = params.get("dir");
}

function syncControls() {
  document.getElementById("view-comparison").classList.toggle("on", STATE.view === "comparison");
  document.getElementById("view-flat").classList.toggle("on", STATE.view === "flat");
  document.getElementById("instance-filter").value = STATE.instance;
  document.getElementById("metric").value = STATE.metric;
}

function attachListeners() {
  document.getElementById("view-comparison").addEventListener("click", () => {
    STATE.view = "comparison"; syncControls(); updateHash(); render();
  });
  document.getElementById("view-flat").addEventListener("click", () => {
    STATE.view = "flat"; syncControls(); updateHash(); render();
  });
  document.getElementById("instance-filter").addEventListener("input", e => {
    STATE.instance = e.target.value; updateHash(); render();
  });
  document.getElementById("metric").addEventListener("change", e => {
    STATE.metric = e.target.value; updateHash(); render();
  });
  document.getElementById("reset-filters").addEventListener("click", () => {
    STATE.problems = new Set(allValues("problems"));
    STATE.kinds = new Set(allValues("kinds"));
    STATE.neighbors = new Set(allValues("neighbors"));
    STATE.bands = new Set(allValues("bands"));
    STATE.instance = "";
    STATE.metric = "best_objective";
    syncControls();
    renderChips();
    updateHash();
    render();
  });
  document.getElementById("detail-close").addEventListener("click", () => {
    document.getElementById("detail").classList.add("hidden");
  });
}

async function main() {
  const summaryEl = document.getElementById("summary");
  summaryEl.textContent = "Loading benchmark data…";
  try {
    DATA = await loadData();
  } catch (err) {
    console.error(err);
    summaryEl.textContent = "";
    document.getElementById("table-wrap").innerHTML =
      `<div class="empty-state">Failed to load benchmark data: ${err.message}.` +
      ` This page must be served over HTTP — locally run ` +
      `<code>cd docs &amp;&amp; python3 -m http.server</code> then open ` +
      `<code>benchmarks/viewer.html</code>. Regenerate the data with ` +
      `<code>python3 docs/benchmarks/render.py</code> if <code>data/manifest.json</code> is missing.</div>`;
    return;
  }
  bootstrapState();
  loadHash();
  syncControls();
  renderChips();
  attachListeners();
  render();
}
main();
</script>
</body>
</html>
